<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendario de Turnos — Interactivo jadsimon</title>
<style>
:root {
--primary: #2aa7a0;
--primary-dark: #228a83;
--night: #0b3b66;
--morning: #f6c24e;
--mixed: #2aa7a0;
--rest-border: #cfcfcf;
--text: #111;
--text-light: #666;
--bg: #f7f7fb;
--card-bg: #fff;
--header-bg: #f0f4fb;
--border: #e2e6ef;
--today-outline: #ff4444;
--diagonal-red: #ff4444;
--vacation: #9b59b6;
}
* { box-sizing: border-box; }
body {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
margin: 0; padding: 12px; background: var(--bg); color: var(--text); line-height: 1.5;
}
header { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
h1 { font-size: 1.15rem; margin: 0 0 6px; font-weight: 700; line-height: 1.3; }
.info { font-size: 0.85rem; color: var(--text-light); max-width: 100%; }
.week-info {
background: #fff8f8; border-left: 3px solid #ff4444; padding: 8px 12px;
margin: 12px 0; border-radius: 0 6px 6px 0; font-weight: 600;
color: #d32f2f; font-size: 0.85rem;
}
.controls {
display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0 16px; padding: 12px;
background: var(--card-bg); border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}
.shift-box { min-width: 180px; flex: 1; }
.shift-box h4 { margin: 0 0 8px; font-size: 0.9rem; font-weight: 600; }
.days-grid { display: flex; gap: 4px; flex-wrap: wrap; }
.days-grid label {
display: inline-flex; align-items: center; gap: 4px; padding: 5px 8px;
border-radius: 6px; border: 1px solid #ececec; background: #fafafa;
font-size: 0.8rem; cursor: pointer; transition: all 0.2s ease;
}
.days-grid input[type="checkbox"] { margin: 0; cursor: pointer; transform: scale(0.9); }
.calendar-grid {
display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px;
}
.month {
background: var(--card-bg); border-radius: 8px; padding: 12px;
box-shadow: 0 1px 6px rgba(20,30,60,0.05); transition: transform 0.2s ease; position: relative;
}
.month:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(20,30,60,0.08); }
.month-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; color: var(--text); }
table.month-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th, td {
padding: 6px; text-align: center; border: 1px solid var(--border);
vertical-align: top; height: 60px; position: relative; font-size: 0.82rem;
}
th { background: var(--header-bg); font-weight: 700; color: var(--text-light); font-size: 0.72rem; padding: 5px; }
.week-col {
width: 40px; background: var(--header-bg); font-weight: 700;
color: var(--primary); font-size: 0.7rem; padding: 6px 2px !important; text-align: center;
}
td .date { font-weight: 700; display: block; margin-bottom: 4px; font-size: 0.85em; }
.turno {
font-size: 0.72rem; padding: 3px 6px; border-radius: 5px; display: inline-block;
color: white; font-weight: 600; text-shadow: 0 1px 1px rgba(0,0,0,0.1);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
}
.noche { background: var(--night); }
.manana { background: var(--morning); color: var(--text); }
.mixto { background: var(--mixed); }
.rest {
background: transparent !important; color: var(--text) !important;
border: 1px dashed var(--rest-border); padding: 3px 6px; border-radius: 5px; font-weight: 700;
}
.other-month { opacity: 0.35; background: #fafafa !important; }
.today { outline: 2px solid var(--today-outline) !important; border-radius: 5px; background: rgba(255,68,68,0.05) !important; }
.diagonal-overlay {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
pointer-events: none; z-index: 1; border-radius: 5px; overflow: hidden;
}
.diagonal-overlay::before {
content: ''; position: absolute; top: 50%; left: 50%; width: 141%; height: 3px;
background: var(--diagonal-red); transform: translate(-50%, -50%) rotate(-45deg); transform-origin: center;
}
.vacation-badge {
position: absolute; bottom: 3px; left: 3px; right: 3px; font-size: 0.62rem;
background: var(--vacation); color: white; border-radius: 4px; padding: 1px 3px;
font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 2;
}
.buttons { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
button {
padding: 7px 14px; border: none; border-radius: 6px; background: var(--primary);
color: white; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
font-size: 0.9rem; min-width: 130px;
}
button:hover { background: var(--primary-dark); transform: translateY(-1px); }
button:active { transform: translateY(0); }
button.secondary { background: #888; }
button.secondary:hover { background: #666; }
button.danger { background: #c0392b; }
button.danger:hover { background: #962d22; }
.notification {
position: fixed; top: 16px; right: 16px; padding: 10px 16px; border-radius: 6px;
color: white; font-weight: 600; z-index: 1000; box-shadow: 0 3px 8px rgba(0,0,0,0.15);
transform: translateX(200%); transition: transform 0.3s ease; font-size: 0.9rem; max-width: 90vw;
}
.notification.show { transform: translateX(0); }
.success { background: #4caf50; }
.warning { background: #ff9800; }
.error { background: #f44336; }

/* ---- Auth / sesión ---- */
.session-box {
background: var(--card-bg); border-radius: 8px; padding: 10px 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
display: flex; align-items: center; gap: 10px; font-size: 0.85rem; flex-wrap: wrap;
}
.session-box .who { font-weight: 700; color: var(--primary-dark); }
.session-box button { min-width: auto; padding: 6px 10px; font-size: 0.8rem; }

/* ---- Modales ---- */
.modal-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none;
align-items: center; justify-content: center; z-index: 2000; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
background: #fff; border-radius: 10px; padding: 20px; max-width: 420px; width: 100%;
max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.modal h3 { margin: 0 0 14px; font-size: 1.05rem; }
.modal label { display: block; font-size: 0.82rem; font-weight: 600; margin: 10px 0 4px; color: var(--text-light); }
.modal input, .modal select {
width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
font-size: 0.9rem; font-family: inherit;
}
.modal .modal-buttons { display: flex; gap: 8px; margin-top: 16px; }
.modal .modal-buttons button { flex: 1; min-width: 0; }
.modal .close-x {
position: absolute; top: 10px; right: 14px; cursor: pointer; font-size: 1.3rem;
color: var(--text-light); background: none; border: none; padding: 0; min-width: auto;
}
.modal { position: relative; }
.tab-row { display: flex; gap: 6px; margin-bottom: 10px; }
.tab-row button {
flex: 1; background: #eee; color: var(--text); min-width: 0; padding: 7px;
}
.tab-row button.active { background: var(--primary); color: #fff; }
.employee-list { margin-top: 10px; max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
.employee-row {
display: flex; justify-content: space-between; align-items: center; padding: 8px 10px;
border-bottom: 1px solid var(--border); font-size: 0.85rem; gap: 8px;
}
.employee-row:last-child { border-bottom: none; }
.employee-row .meta { flex: 1; }
.employee-row .meta strong { display: block; }
.employee-row .meta span { color: var(--text-light); font-size: 0.78rem; }
.employee-row .row-actions { display: flex; gap: 4px; }
.employee-row .row-actions button { min-width: auto; padding: 4px 8px; font-size: 0.75rem; }
.vacation-list-item {
display: flex; justify-content: space-between; align-items: center; padding: 8px 10px;
border-bottom: 1px solid var(--border); font-size: 0.82rem; gap: 8px;
}
.vacation-list-item:last-child { border-bottom: none; }
.vacation-list-item button { min-width: auto; padding: 4px 8px; font-size: 0.75rem; }

@media (max-width: 768px) {
body { padding: 8px; }
.controls { flex-direction: column; }
.shift-box { min-width: 100%; }
.calendar-grid { grid-template-columns: 1fr; gap: 10px; }
.month { padding: 10px; }
table.month-table { font-size: 0.78rem; }
th, td { padding: 5px; height: 56px; }
th { font-size: 0.68rem; padding: 4px; }
.week-col { width: 36px; font-size: 0.68rem; padding: 5px 1px !important; }
td .date { font-size: 0.82em; margin-bottom: 3px; }
.turno { font-size: 0.7rem; padding: 2px 5px; }
.buttons { flex-direction: column; gap: 8px; }
button { min-width: auto; width: 100%; padding: 8px; font-size: 0.92rem; }
h1 { font-size: 1.1rem; }
.info { font-size: 0.82rem; }
header { flex-direction: column; }
}
</style>
</head>
<body>
<header>
<div>
<h1>Calendario personal de turnos — Interactivo jadsimon</h1>
<div class="info">Periodo: <strong>Feb 2026</strong> → <strong>31 Dic 2026</strong> · Ciclo: <strong>4 semanas Noche → 4 semanas Mañana → 4 semanas Mixto</strong></div>
<div class="week-info" id="current-week-info"></div>
</div>
<div class="session-box" id="session-box">
  <span>Cargando sesión…</span>
</div>
</header>

<section class="controls" id="controls"></section>

<div class="buttons" id="action-buttons" style="margin-bottom:16px;"></div>

<main>
<div class="calendar-grid" id="calendar"></div>
</main>

<div id="notification" class="notification"></div>

<!-- ===== Modal: Login ===== -->
<div class="modal-overlay" id="modal-login">
  <div class="modal">
    <button class="close-x" data-close="modal-login">&times;</button>
    <h3>Iniciar sesión</h3>
    <label>Número de empleado</label>
    <input type="text" id="login-numero" placeholder="Ej. 1023" inputmode="numeric" />
    <label>Contraseña</label>
    <input type="password" id="login-password" placeholder="Contraseña" />
    <div class="modal-buttons">
      <button class="secondary" data-close="modal-login">Cancelar</button>
      <button id="btn-do-login">Entrar</button>
    </div>
  </div>
</div>

<!-- ===== Modal: Agregar vacaciones ===== -->
<div class="modal-overlay" id="modal-vacaciones">
  <div class="modal">
    <button class="close-x" data-close="modal-vacaciones">&times;</button>
    <h3>Registrar vacaciones</h3>
    <label>Empleado</label>
    <select id="vac-empleado"></select>
    <label>Fecha inicio</label>
    <input type="date" id="vac-inicio" />
    <label>Fecha fin</label>
    <input type="date" id="vac-fin" />
    <label>Nota (opcional)</label>
    <input type="text" id="vac-nota" placeholder="Ej. Vacaciones de verano" />
    <div class="modal-buttons">
      <button class="secondary" data-close="modal-vacaciones">Cancelar</button>
      <button id="btn-save-vacacion">Guardar</button>
    </div>
    <div class="employee-list" id="vac-list" style="margin-top:14px;"></div>
  </div>
</div>

<!-- ===== Modal: Panel admin (gestión de empleados) ===== -->
<div class="modal-overlay" id="modal-admin">
  <div class="modal">
    <button class="close-x" data-close="modal-admin">&times;</button>
    <h3>Panel de administración</h3>
    <div class="tab-row">
      <button class="tab-btn active" data-tab="tab-nuevo">Nuevo empleado</button>
      <button class="tab-btn" data-tab="tab-lista">Empleados</button>
    </div>
    <div id="tab-nuevo">
      <label>Número de empleado</label>
      <input type="text" id="admin-numero" placeholder="Ej. 1023" inputmode="numeric" />
      <label>Nombre</label>
      <input type="text" id="admin-nombre" placeholder="Ej. Christian" />
      <label>Contraseña temporal</label>
      <input type="text" id="admin-password" placeholder="Ej. 1023" />
      <label style="display:flex;align-items:center;gap:6px;margin-top:12px;">
        <input type="checkbox" id="admin-es-admin" style="width:auto;" /> Es administrador
      </label>
      <div class="modal-buttons">
        <button id="btn-create-employee">Crear cuenta</button>
      </div>
    </div>
    <div id="tab-lista" style="display:none;">
      <div class="employee-list" id="admin-employee-list"></div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->

};

<script>
(function(){
// Inicio REAL del ciclo original (para mantener la secuencia exacta)
const cycleStart = new Date(2025, 8, 15); // 15 Sep 2025

// Rango VISIBLE: Feb 2026 → 31 Dic 2026
const displayStart = new Date(2026, 1, 1);   // 1 Feb 2026
const displayEnd   = new Date(2026, 11, 31);  // 31 Dic 2026

const shifts = ['Noche','Mañana','Mixto'];
const shiftClasses = {'Noche':'noche','Mañana':'manana','Mixto':'mixto'};
const shiftDisplayNames = {'Noche':'Noc.','Mañana':'Día','Mixto':'Mix'};
const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const weekdayLabels = ['L','M','M','J','V','S','D'];
const weekdayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const defaultRest = {
  'Noche':  [0, 1],
  'Mañana': [4, 5],
  'Mixto':  [2, 3, 6]
};

const defaultSpecialDays = [];

let simulatedStorage = JSON.stringify({ restConfig: defaultRest, specialDays: defaultSpecialDays });

// ---- Estado de sesión y datos ----
let currentUser = null;       // { uid, numero, nombre, admin }
let employeesCache = {};      // uid -> {numero, nombre, admin}
let vacationsCache = [];      // [{id, uid, nombre, inicio, fin, nota}]

const controlsEl = document.getElementById('controls');
const notificationEl = document.getElementById('notification');
const currentWeekInfoEl = document.getElementById('current-week-info');
const sessionBoxEl = document.getElementById('session-box');
const actionButtonsEl = document.getElementById('action-buttons');

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function getCurrentRealDate() { return new Date(); }

function showNotification(message, type = 'success') {
  notificationEl.textContent = message;
  notificationEl.className = `notification ${type} show`;
  setTimeout(() => { notificationEl.classList.remove('show'); }, 3500);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeModal(btn.dataset.close));
});
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });
});

function buildControls(restByShift) {
  controlsEl.innerHTML = '';
  shifts.forEach(shift => {
    const box = document.createElement('div');
    box.className = 'shift-box';
    const h = document.createElement('h4');
    h.textContent = shift + ' — marcar días de DESCANSO';
    box.appendChild(h);
    const daysWrap = document.createElement('div');
    daysWrap.className = 'days-grid';
    for (let d = 0; d < 7; d++) {
      const lbl = document.createElement('label');
      const inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.dataset.shift = shift;
      inp.dataset.day = d.toString();
      inp.checked = (restByShift[shift] || []).includes(d);
      inp.addEventListener('change', () => renderCalendar(readRestConfig()));
      const span = document.createElement('span');
      span.textContent = weekdayNames[d];
      lbl.appendChild(inp);
      lbl.appendChild(span);
      daysWrap.appendChild(lbl);
    }
    box.appendChild(daysWrap);
    controlsEl.appendChild(box);
  });
  const btns = document.createElement('div');
  btns.className = 'buttons';
  const saveBtn = document.createElement('button');
  saveBtn.textContent = "Guardar configuración";
  saveBtn.onclick = saveConfig;
  const loadBtn = document.createElement('button');
  loadBtn.textContent = "Restaurar configuración";
  loadBtn.onclick = loadConfig;
  btns.appendChild(saveBtn);
  btns.appendChild(loadBtn);
  controlsEl.appendChild(btns);
}

function readRestConfig() {
  const cfg = {'Noche':[], 'Mañana':[], 'Mixto':[]};
  controlsEl.querySelectorAll('input[type="checkbox"]').forEach(inp => {
    if (inp.checked) cfg[inp.dataset.shift].push(Number(inp.dataset.day));
  });
  return cfg;
}

function saveConfig() {
  const specialDays = JSON.parse(simulatedStorage).specialDays || defaultSpecialDays;
  simulatedStorage = JSON.stringify({ restConfig: readRestConfig(), specialDays });
  showNotification("✅ Configuración guardada");
}

function loadConfig() {
  try {
    const data = JSON.parse(simulatedStorage);
    buildControls(data.restConfig || defaultRest);
    renderCalendar(data.restConfig || defaultRest);
    showNotification("🔄 Configuración restaurada");
  } catch (e) {
    showNotification("⚠️ No hay configuración guardada", 'warning');
  }
}

function getShiftForDate(date) {
  const dayIndex = Math.round((date - cycleStart) / 86400000);
  const blockIndex = Math.floor(dayIndex / 28);
  return shifts[blockIndex % shifts.length];
}

function generateDays() {
  const arr = [];
  const totalDays = Math.round((displayEnd - displayStart) / 86400000) + 1;
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(displayStart);
    d.setDate(displayStart.getDate() + i);
    arr.push({ date: d, shift: getShiftForDate(d) });
  }
  return arr;
}

function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function vacationsForDate(cellDateStr) {
  return vacationsCache.filter(v => cellDateStr >= v.inicio && cellDateStr <= v.fin);
}

function renderCalendar(restByShift) {
  const days = generateDays();
  const months = {};
  days.forEach(item => {
    const key = `${item.date.getFullYear()}-${item.date.getMonth()}`;
    if (!months[key]) months[key] = [];
    months[key].push(item);
  });

  const keys = Object.keys(months).sort((a, b) => {
    const [ay, am] = a.split('-').map(Number);
    const [by, bm] = b.split('-').map(Number);
    return ay !== by ? ay - by : am - bm;
  });

  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const todayReal = getCurrentRealDate();
  const todayRealStr = `${todayReal.getFullYear()}-${todayReal.getMonth()}-${todayReal.getDate()}`;
  currentWeekInfoEl.textContent = `📅 Semana actual del año: ${getWeekNumber(todayReal)}`;
  currentWeekInfoEl.style.display = 'block';

  const currentMonthKey = `${todayReal.getFullYear()}-${todayReal.getMonth()}`;
  let targetMonthElement = null;

  const specialDays = JSON.parse(simulatedStorage).specialDays || defaultSpecialDays;

  keys.forEach(key => {
    const [year, month] = key.split('-').map(Number);
    const monthDays = months[key];
    const monthEl = document.createElement('section');
    monthEl.className = 'month';
    if (key === currentMonthKey) { monthEl.id = 'current-month'; targetMonthElement = monthEl; }

    const title = document.createElement('div');
    title.className = 'month-title';
    title.textContent = `${monthNames[month]} ${year}`;
    monthEl.appendChild(title);

    const table = document.createElement('table');
    table.className = 'month-table';
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    const weekHeader = document.createElement('th');
    weekHeader.textContent = 'Sem';
    weekHeader.className = 'week-col';
    headRow.appendChild(weekHeader);
    weekdayLabels.forEach(lbl => {
      const th = document.createElement('th'); th.textContent = lbl; headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const firstOfMonth = new Date(year, month, 1);
    const offset = (firstOfMonth.getDay() + 6) % 7;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < offset; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const matched = monthDays.find(x => x.date.getDate() === d);
      if (matched) cells.push(matched);
      else cells.push({ date: new Date(year, month, d), shift: null, outOfRange: true });
    }
    while (cells.length % 7 !== 0) cells.push(null);

    for (let r = 0; r < cells.length / 7; r++) {
      const tr = document.createElement('tr');
      let firstValidDate = null;
      for (let c = 0; c < 7; c++) {
        const cell = cells[r * 7 + c];
        if (cell && !cell.outOfRange) { firstValidDate = cell.date; break; }
      }
      if (!firstValidDate && cells[r * 7]) firstValidDate = cells[r * 7].date;

      const weekTd = document.createElement('td');
      weekTd.className = 'week-col';
      weekTd.textContent = firstValidDate ? getWeekNumber(firstValidDate) : '';
      tr.appendChild(weekTd);

      for (let c = 0; c < 7; c++) {
        const cell = cells[r * 7 + c];
        const td = document.createElement('td');
        if (!cell) {
          td.className = 'other-month';
        } else {
          const dayNum = document.createElement('span');
          dayNum.className = 'date';
          dayNum.textContent = cell.date.getDate();
          td.appendChild(dayNum);

          if (cell.shift) {
            const jsDay = cell.date.getDay();
            const isRest = (restByShift[cell.shift] || []).includes(jsDay);
            const span = document.createElement('span');
            span.className = isRest ? 'turno rest' : 'turno ' + shiftClasses[cell.shift];
            span.textContent = isRest ? 'D' : shiftDisplayNames[cell.shift];
            td.appendChild(span);
          } else {
            td.classList.add('other-month');
          }

          const cellDateStr = `${cell.date.getFullYear()}-${cell.date.getMonth()}-${cell.date.getDate()}`;
          const isoDateStr = dateStr(cell.date);
          if (cellDateStr === todayRealStr) td.classList.add('today');
          if (specialDays.includes(cellDateStr)) {
            const diagonal = document.createElement('div');
            diagonal.className = 'diagonal-overlay';
            td.style.position = 'relative';
            td.appendChild(diagonal);
          }

          const vacsToday = vacationsForDate(isoDateStr);
          if (vacsToday.length) {
            td.style.position = 'relative';
            const badge = document.createElement('div');
            badge.className = 'vacation-badge';
            badge.title = vacsToday.map(v => v.nombre + (v.nota ? ' — ' + v.nota : '')).join(', ');
            badge.textContent = vacsToday.length === 1
              ? '🏖 ' + vacsToday[0].nombre
              : '🏖 ' + vacsToday.length + ' empleados';
            td.appendChild(badge);
          }
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    monthEl.appendChild(table);
    cal.appendChild(monthEl);
  });

  setTimeout(() => {
    if (targetMonthElement) {
      targetMonthElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
      targetMonthElement.style.boxShadow = '0 0 0 3px rgba(42, 167, 160, 0.4)';
      setTimeout(() => { targetMonthElement.style.boxShadow = '0 1px 6px rgba(20,30,60,0.05)'; }, 2000);
    }
  }, 100);
}

function rerender() {
  renderCalendar(readRestConfig().Noche ? readRestConfig() : JSON.parse(simulatedStorage).restConfig || defaultRest);
}

// ===================== FIREBASE / AUTH / VACACIONES =====================

const fb = window.__firebase;

function renderSessionBox() {
  sessionBoxEl.innerHTML = '';
  if (currentUser) {
    const who = document.createElement('span');
    who.innerHTML = `Hola, <span class="who">${escapeHtml(currentUser.nombre)}</span>${currentUser.admin ? ' (admin)' : ''}`;
    const logoutBtn = document.createElement('button');
    logoutBtn.textContent = 'Cerrar sesión';
    logoutBtn.className = 'secondary';
    logoutBtn.onclick = doLogout;
    sessionBoxEl.appendChild(who);
    sessionBoxEl.appendChild(logoutBtn);
  } else {
    const span = document.createElement('span');
    span.textContent = 'No has iniciado sesión';
    const loginBtn = document.createElement('button');
    loginBtn.textContent = 'Iniciar sesión';
    loginBtn.onclick = () => openModal('modal-login');
    sessionBoxEl.appendChild(span);
    sessionBoxEl.appendChild(loginBtn);
  }
  renderActionButtons();
}

function renderActionButtons() {
  actionButtonsEl.innerHTML = '';
  const vacBtn = document.createElement('button');
  vacBtn.textContent = '🏖 Vacaciones';
  vacBtn.onclick = () => {
    if (!currentUser) { showNotification('Primero inicia sesión', 'warning'); openModal('modal-login'); return; }
    openVacacionesModal();
  };
  actionButtonsEl.appendChild(vacBtn);

  if (currentUser && currentUser.admin) {
    const adminBtn = document.createElement('button');
    adminBtn.textContent = '⚙️ Panel admin';
    adminBtn.className = 'secondary';
    adminBtn.onclick = openAdminModal;
    actionButtonsEl.appendChild(adminBtn);
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function doLogin() {
  const numero = document.getElementById('login-numero').value.trim();
  const password = document.getElementById('login-password').value;
  if (!numero || !password) { showNotification('Completa número de empleado y contraseña', 'warning'); return; }
  const email = numero + '@' + fb.FAKE_DOMAIN;
  try {
    await fb.signInWithEmailAndPassword(fb.auth, email, password);
    closeModal('modal-login');
    document.getElementById('login-numero').value = '';
    document.getElementById('login-password').value = '';
    showNotification('✅ Sesión iniciada');
  } catch (e) {
    console.error(e);
    showNotification('❌ Número de empleado o contraseña incorrectos', 'error');
  }
}

async function doLogout() {
  await fb.signOut(fb.auth);
  showNotification('Sesión cerrada');
}

document.getElementById('btn-do-login').addEventListener('click', doLogin);
document.getElementById('login-password').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

// ---- Cargar empleados (para selects y panel admin) ----
async function loadEmployees() {
  const snap = await fb.getDocs(fb.collection(fb.db, 'empleados'));
  employeesCache = {};
  snap.forEach(d => { employeesCache[d.id] = d.data(); });
}

// ---- Suscripción en tiempo real a vacaciones (público, sin login) ----
function subscribeVacations() {
  const q = fb.query(fb.collection(fb.db, 'vacaciones'));
  fb.onSnapshot(q, (snap) => {
    vacationsCache = [];
    snap.forEach(d => {
      const data = d.data();
      vacationsCache.push({ id: d.id, ...data });
    });
    rerender();
  }, (err) => {
    console.error('Error leyendo vacaciones', err);
  });
}

// ---- Modal vacaciones ----
function openVacacionesModal() {
  const select = document.getElementById('vac-empleado');
  select.innerHTML = '';
  if (currentUser.admin) {
    Object.entries(employeesCache).forEach(([uid, emp]) => {
      const opt = document.createElement('option');
      opt.value = uid;
      opt.textContent = `${emp.nombre} (#${emp.numero})`;
      select.appendChild(opt);
    });
  } else {
    const opt = document.createElement('option');
    opt.value = currentUser.uid;
    opt.textContent = `${currentUser.nombre} (#${currentUser.numero})`;
    select.appendChild(opt);
  }
  renderVacationList();
  openModal('modal-vacaciones');
}

function renderVacationList() {
  const listEl = document.getElementById('vac-list');
  listEl.innerHTML = '';
  const visibles = currentUser.admin
    ? vacationsCache
    : vacationsCache.filter(v => v.uid === currentUser.uid);

  if (!visibles.length) {
    listEl.innerHTML = '<div style="padding:10px;font-size:0.8rem;color:#888;">Sin vacaciones registradas.</div>';
    return;
  }
  visibles
    .sort((a,b) => a.inicio.localeCompare(b.inicio))
    .forEach(v => {
      const row = document.createElement('div');
      row.className = 'vacation-list-item';
      const info = document.createElement('span');
      info.textContent = `${v.nombre}: ${v.inicio} → ${v.fin}${v.nota ? ' (' + v.nota + ')' : ''}`;
      const delBtn = document.createElement('button');
      delBtn.textContent = 'Borrar';
      delBtn.className = 'danger';
      delBtn.onclick = () => deleteVacation(v.id);
      row.appendChild(info);
      row.appendChild(delBtn);
      listEl.appendChild(row);
    });
}

async function saveVacacion() {
  const uid = document.getElementById('vac-empleado').value;
  const inicio = document.getElementById('vac-inicio').value;
  const fin = document.getElementById('vac-fin').value;
  const nota = document.getElementById('vac-nota').value.trim();
  if (!uid || !inicio || !fin) { showNotification('Completa empleado, fecha inicio y fin', 'warning'); return; }
  if (fin < inicio) { showNotification('La fecha fin no puede ser antes que la fecha inicio', 'warning'); return; }

  const emp = employeesCache[uid] || currentUser;
  const docId = uid + '_' + inicio + '_' + fin;
  try {
    await fb.setDoc(fb.doc(fb.db, 'vacaciones', docId), {
      uid, nombre: emp.nombre, inicio, fin, nota,
      registradoPor: currentUser.uid
    });
    showNotification('✅ Vacaciones registradas');
    document.getElementById('vac-inicio').value = '';
    document.getElementById('vac-fin').value = '';
    document.getElementById('vac-nota').value = '';
  } catch (e) {
    console.error(e);
    showNotification('❌ No se pudo guardar (revisa permisos)', 'error');
  }
}

async function deleteVacation(id) {
  try {
    await fb.deleteDoc(fb.doc(fb.db, 'vacaciones', id));
    showNotification('🗑 Vacaciones eliminadas');
  } catch (e) {
    console.error(e);
    showNotification('❌ No se pudo eliminar', 'error');
  }
}

document.getElementById('btn-save-vacacion').addEventListener('click', saveVacacion);

// ---- Panel admin ----
function openAdminModal() {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-tab="tab-nuevo"]').classList.add('active');
  document.getElementById('tab-nuevo').style.display = 'block';
  document.getElementById('tab-lista').style.display = 'none';
  renderAdminEmployeeList();
  openModal('modal-admin');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-nuevo').style.display = btn.dataset.tab === 'tab-nuevo' ? 'block' : 'none';
    document.getElementById('tab-lista').style.display = btn.dataset.tab === 'tab-lista' ? 'block' : 'none';
    if (btn.dataset.tab === 'tab-lista') renderAdminEmployeeList();
  });
});

function renderAdminEmployeeList() {
  const listEl = document.getElementById('admin-employee-list');
  listEl.innerHTML = '';
  const entries = Object.entries(employeesCache);
  if (!entries.length) {
    listEl.innerHTML = '<div style="padding:10px;font-size:0.8rem;color:#888;">Sin empleados registrados.</div>';
    return;
  }
  entries.forEach(([uid, emp]) => {
    const row = document.createElement('div');
    row.className = 'employee-row';
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<strong>${escapeHtml(emp.nombre)}</strong><span>#${escapeHtml(emp.numero)} ${emp.admin ? '· admin' : ''}</span>`;
    row.appendChild(meta);
    listEl.appendChild(row);
  });
}

async function createEmployee() {
  const numero = document.getElementById('admin-numero').value.trim();
  const nombre = document.getElementById('admin-nombre').value.trim();
  const password = document.getElementById('admin-password').value;
  const isAdmin = document.getElementById('admin-es-admin').checked;

  if (!numero || !nombre || !password) { showNotification('Completa todos los campos', 'warning'); return; }
  if (password.length < 6) { showNotification('La contraseña debe tener al menos 6 caracteres', 'warning'); return; }

  const email = numero + '@' + fb.FAKE_DOMAIN;
  try {
    const cred = await fb.createUserWithEmailAndPassword(fb.secondaryAuth, email, password);
    const uid = cred.user.uid;
    await fb.setDoc(fb.doc(fb.db, 'empleados', uid), { numero, nombre, admin: isAdmin });
    await fb.signOut(fb.secondaryAuth);
    await loadEmployees();
    renderAdminEmployeeList();
    showNotification('✅ Cuenta creada para ' + nombre);
    document.getElementById('admin-numero').value = '';
    document.getElementById('admin-nombre').value = '';
    document.getElementById('admin-password').value = '';
    document.getElementById('admin-es-admin').checked = false;
  } catch (e) {
    console.error(e);
    if (e.code === 'auth/email-already-in-use') {
      showNotification('❌ Ese número de empleado ya tiene cuenta', 'error');
    } else {
      showNotification('❌ Error al crear la cuenta', 'error');
    }
  }
}

document.getElementById('btn-create-employee').addEventListener('click', createEmployee);

// ---- Listener de estado de autenticación ----
fb.onAuthStateChanged(fb.auth, async (user) => {
  if (user) {
    let empData = employeesCache[user.uid];
    if (!empData) {
      const snap = await fb.getDoc(fb.doc(fb.db, 'empleados', user.uid));
      empData = snap.exists() ? snap.data() : { numero: '?', nombre: 'Usuario', admin: false };
    }
    currentUser = { uid: user.uid, ...empData };
  } else {
    currentUser = null;
  }
  renderSessionBox();
});

// ---- Inicialización general ----
async function init() {
  const savedData = JSON.parse(simulatedStorage);
  buildControls(savedData.restConfig || defaultRest);
  renderCalendar(savedData.restConfig || defaultRest);
  renderSessionBox();

  await loadEmployees();
  subscribeVacations();
}

init();

})();
</script>
